<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Chat Hacker</title>
   
    <style>
        /* Custom Scrollbar for Chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        
        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glass-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        
        /* Smooth fade animations */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-slate-800 to-black text-white h-[100dvh] overflow-hidden flex justify-center font-sans antialiased">

    <div class="w-full max-w-md h-full flex flex-col relative shadow-2xl">
        
        <header class="glass flex justify-between items-center p-4 z-10 rounded-b-2xl">
            <h1 class="text-lg font-bold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                YT CHAT HACKER
            </h1>
            <button onclick="toggleSettings()" class="p-2 rounded-full hover:bg-white/10 transition">
                http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256">
                    <path d="M128,80a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Zm88-29.84q.06-2.16,0-4.32l14.92-18.64a8,8,0,0,0,1.48-7.06,107.21,107.21,0,0,0-10.88-26.25,8,8,0,0,0-6-3.93l-23.72-2.61a89.21,89.21,0,0,0-14.61-25.33l8.9-22.14a8,8,0,0,0-2.73-8.67,107.6,107.6,0,0,0-25-14.48,8,8,0,0,0-7.15.59L130.59,45.2a89.21,89.21,0,0,0-29.18,0L81.28,27.27a8,8,0,0,0-7.15-.59,107.6,107.6,0,0,0-25,14.48,8,8,0,0,0-2.73,8.67l8.9,22.14a89.21,89.21,0,0,0-14.61,25.33l-23.72,2.61a8,8,0,0,0-6,3.93,107.21,107.21,0,0,0-10.88,26.25,8,8,0,0,0,1.48,7.06L16,125.84q-.06,2.16,0,4.32L1.08,148.8a8,8,0,0,0-1.48,7.06,107.21,107.21,0,0,0,10.88,26.25,8,8,0,0,0,6,3.93l23.72,2.61a89.21,89.21,0,0,0,14.61,25.33l-8.9,22.14a8,8,0,0,0,2.73,8.67,107.6,107.6,0,0,0,25,14.48,8,8,0,0,0,7.15-.59L106.59,242.8a89.21,89.21,0,0,0,29.18,0l20.13,17.93a8,8,0,0,0,7.15.59,107.6,107.6,0,0,0,25-14.48,8,8,0,0,0,2.73-8.67l-8.9-22.14a89.21,89.21,0,0,0,14.61-25.33l23.72-2.61a8,8,0,0,0,6-3.93,107.21,107.21,0,0,0,10.88-26.25,8,8,0,0,0-1.48-7.06ZM128,216C79.4,216,40,176.6,40,128S79.4,40,128,40s88,39.4,88,88S176.6,216,128,216Z"></path>
                </svg>
            </button>
        </header>

        <div class="px-4 py-3 border-b border-white/10 z-10">
            <div class="flex gap-2">
                <input type="text" id="yt-url" placeholder="Paste YouTube URL here..." class="flex-1 glass-input rounded-xl px-4 py-2 text-sm text-white placeholder-gray-400 transition">
                <button onclick="loadVideoContext()" id="load-btn" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 px-4 py-2 rounded-xl text-sm font-semibold shadow-lg transition flex items-center justify-center min-w-[80px]">
                    <span id="load-text">Load</span>
                    <div id="load-spinner" class="loader hidden"></div>
                </button>
            </div>
            <div id="context-status" class="text-xs text-gray-400 mt-2 text-center hidden"></div>
        </div>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
            <div class="flex flex-col items-start fade-in">
                <div class="glass px-4 py-3 rounded-2xl rounded-tl-sm max-w-[85%] text-sm">
                    Welcome! Paste a YouTube URL above and click Load to fetch the transcript. Then, ask me anything about the video!
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 w-full p-4 glass rounded-t-2xl z-10">
            <div class="flex gap-2">
                <input type="text" id="chat-input" placeholder="Ask about the video..." class="flex-1 glass-input rounded-xl px-4 py-3 text-sm text-white placeholder-gray-400 transition" onkeypress="handleEnter(event)">
                <button onclick="sendMessage()" id="send-btn" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 px-4 py-3 rounded-xl text-sm font-semibold shadow-lg transition flex items-center justify-center min-w-[60px]">
                    <span id="send-text">
                        http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
                    </span>
                    <div id="send-spinner" class="loader hidden"></div>
                </button>
            </div>
        </div>

        <div id="settings-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex-col justify-end transition-opacity duration-300 opacity-0">
            <div class="glass w-full rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300" id="settings-content">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">LLM Settings</h2>
                    <button onclick="toggleSettings()" class="text-gray-400 hover:text-white">
                        http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256">
                    </button>
                </div>
                
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">OpenRouter API Key</label>
                        <input type="password" id="api-key" placeholder="sk-or-v1-..." class="w-full glass-input rounded-xl px-4 py-3 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Model Name (Manual Input)</label>
                        <input type="text" id="model-name" placeholder="e.g., google/gemini-2.5-flash" class="w-full glass-input rounded-xl px-4 py-3 text-sm text-white">
                        <p class="text-[10px] text-yellow-400 mt-1">* Ensure you type the exact OpenRouter model ID.</p>
                    </div>
                </div>
                
                <button onclick="saveSettings()" class="w-full bg-white text-black font-bold py-3 rounded-xl shadow-lg hover:bg-gray-200 transition">
                    Save Settings
                </button>
            </div>
        </div>

    </div>

    <script>
        // Global State
        let videoContext = "";
        let chatHistory = [];
        
        // DOM Elements
        const modal = document.getElementById('settings-modal');
        const modalContent = document.getElementById('settings-content');
        const chatContainer = document.getElementById('chat-container');
        const ytInput = document.getElementById('yt-url');
        const chatInput = document.getElementById('chat-input');
        const contextStatus = document.getElementById('context-status');

        // Initialization
        window.onload = () => {
            const savedKey = localStorage.getItem('openRouterKey');
            const savedModel = localStorage.getItem('openRouterModel');
            
            if (savedKey) document.getElementById('api-key').value = savedKey;
            if (savedModel) document.getElementById('model-name').value = savedModel;
            
            // Suggest settings if empty
            if (!savedKey || !savedModel) {
                appendMessage('system', 'Please click the gear icon (⚙️) to set your OpenRouter API Key and Model Name before chatting.');
            }
        };

        // --- UI & Modal Logic ---
        
        function toggleSettings() {
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                // slight delay to allow display:block to apply before animating opacity
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('translate-y-full');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                modalContent.classList.add('translate-y-full');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        function saveSettings() {
            const key = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-name').value.trim();
            
            if (!key || !model) {
                alert("Both fields are required.");
                return;
            }
            
            localStorage.setItem('openRouterKey', key);
            localStorage.setItem('openRouterModel', model);
            toggleSettings();
            
            appendMessage('system', 'Settings saved successfully. Ready to roll!');
        }

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex flex-col fade-in mb-4 ${role === 'user' ? 'items-end' : 'items-start'}`;
            
            let bgClass = role === 'user' ? 'bg-blue-600 text-white' : 'glass text-white';
            if (role === 'system') bgClass = 'bg-yellow-500/20 text-yellow-200 border border-yellow-500/30 text-xs';
            if (role === 'error') bgClass = 'bg-red-500/20 text-red-200 border border-red-500/30 text-xs';

            const innerDiv = document.createElement('div');
            innerDiv.className = `px-4 py-3 rounded-2xl max-w-[85%] text-sm whitespace-pre-wrap ${bgClass} ${role === 'user' ? 'rounded-tr-sm' : 'rounded-tl-sm'}`;
            innerDiv.innerText = text;
            
            div.appendChild(innerDiv);
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function toggleLoading(buttonPrefix, isLoading) {
            const textEl = document.getElementById(`${buttonPrefix}-text`);
            const spinnerEl = document.getElementById(`${buttonPrefix}-spinner`);
            const btnEl = document.getElementById(`${buttonPrefix}-btn`);
            
            if (isLoading) {
                textEl.classList.add('hidden');
                spinnerEl.classList.remove('hidden');
                btnEl.disabled = true;
                btnEl.classList.add('opacity-70');
            } else {
                textEl.classList.remove('hidden');
                spinnerEl.classList.add('hidden');
                btnEl.disabled = false;
                btnEl.classList.remove('opacity-70');
            }
        }

        // --- Core Logic: Fetching Transcript via Jina ---
        
        async function loadVideoContext() {
            const url = ytInput.value.trim();
            if (!url) {
                alert("Please enter a YouTube URL");
                return;
            }

            toggleLoading('load', true);
            contextStatus.classList.remove('hidden');
            contextStatus.innerText = "Extracting transcript via Jina Reader...";
            contextStatus.className = "text-xs text-blue-400 mt-2 text-center fade-in";

            try {
                // The Hack: Prepend Jina Reader base URL
                const jinaUrl = `https://r.jina.ai/${url}`;
                
                // Fetch handles CORS properly as per Jina's proxy design
                const response = await fetch(jinaUrl, {
                    headers: {
                        'Accept': 'text/plain',
                    }
                });

                if (!response.ok) throw new Error(`Jina returned status ${response.status}`);
                
                const textContext = await response.text();
                
                if (textContext.length < 50) {
                     throw new Error("Transcript seems too short or unavailable.");
                }

                videoContext = textContext;
                contextStatus.innerText = `✅ Transcript loaded successfully! (${videoContext.length} chars)`;
                contextStatus.className = "text-xs text-green-400 mt-2 text-center fade-in";
                
                appendMessage('system', 'Video context loaded! Ask your questions below.');

            } catch (error) {
                console.error(error);
                contextStatus.innerText = "❌ Failed to load transcript.";
                contextStatus.className = "text-xs text-red-400 mt-2 text-center fade-in";
                appendMessage('error', `Error loading video: ${error.message}`);
            } finally {
                toggleLoading('load', false);
            }
        }

        // --- Core Logic: Chatting with OpenRouter ---

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            const apiKey = localStorage.getItem('openRouterKey');
            const modelName = localStorage.getItem('openRouterModel');

            if (!apiKey || !modelName) {
                appendMessage('error', 'Missing API Key or Model. Click the Gear icon to set them.');
                return;
            }

            if (!videoContext) {
                appendMessage('system', 'Please load a YouTube video transcript first.');
                return;
            }

            // Update UI
            appendMessage('user', message);
            chatInput.value = '';
            toggleLoading('send', true);

            // Build history payload
            chatHistory.push({ role: 'user', content: message });

            const systemPrompt = {
                role: 'system',
                content: `You are an AI assistant helping a user understand a specific YouTube video. Answer their questions accurately based ONLY on the following extracted transcript/content from the video. If the answer isn't in the context, say so.\n\n--- VIDEO CONTEXT ---\n${videoContext}\n--- END CONTEXT ---`
            };

            const apiPayload = {
                model: modelName, // Manually typed model name used strictly here
                messages: [systemPrompt, ...chatHistory]
            };

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'HTTP-Referer': window.location.href, // Recommended by OpenRouter
                        'X-Title': 'YT Chat Hacker', // Recommended by OpenRouter
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(apiPayload)
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || `API Error: ${response.status}`);
                }

                const data = await response.json();
                const aiReply = data.choices[0].message.content;
                
                chatHistory.push({ role: 'assistant', content: aiReply });
                appendMessage('assistant', aiReply);

            } catch (error) {
                console.error(error);
                appendMessage('error', `LLM Request Failed: ${error.message}`);
                // Remove failed message from history
                chatHistory.pop();
            } finally {
                toggleLoading('send', false);
            }
        }
    </script>
</body>
  </html>
